<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#171717"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="30"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Purple glow behind Onix -->
  <ellipse cx="280" cy="210" rx="200" ry="170" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Onix image -->
  <image href="onix.webp" x="80" y="20" width="360" height="360" opacity="0.95"/>

  <!-- Title text -->
  <text x="520" y="170" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="80" font-weight="bold" fill="#fff" letter-spacing="-2">onyx</text>

  <!-- Subtitle -->
  <text x="520" y="210" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="18" fill="#a3a3a3">Gemma 4 in your browser</text>

  <!-- Feature pills -->
  <g font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="12">
    <rect x="520" y="235" rx="12" ry="12" width="108" height="24" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
    <text x="541" y="251" fill="#818cf8">WebGPU</text>

    <rect x="638" y="235" rx="12" ry="12" width="115" height="24" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
    <text x="656" y="251" fill="#818cf8">Multimodal</text>

    <rect x="763" y="235" rx="12" ry="12" width="105" height="24" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
    <text x="783" y="251" fill="#818cf8">On-device</text>

    <rect x="878" y="235" rx="12" ry="12" width="100" height="24" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
    <text x="903" y="251" fill="#818cf8">Arena</text>

    <rect x="520" y="269" rx="12" ry="12" width="80" height="24" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
    <text x="542" y="285" fill="#a3a3a3">E2B</text>

    <rect x="610" y="269" rx="12" ry="12" width="80" height="24" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
    <text x="632" y="285" fill="#a3a3a3">E4B</text>

    <rect x="700" y="269" rx="12" ry="12" width="100" height="24" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
    <text x="718" y="285" fill="#a3a3a3">ONNX q4</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="396" width="1200" height="4" fill="url(#gem)" opacity="0.6"/>
</svg>

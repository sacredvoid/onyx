<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#171717"/>
    </linearGradient>
    <linearGradient id="rock" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#737373"/>
      <stop offset="50%" stop-color="#525252"/>
      <stop offset="100%" stop-color="#404040"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Glow behind the snake -->
  <ellipse cx="350" cy="200" rx="180" ry="150" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Onix rock snake body - stylized segmented form -->
  <!-- Tail -->
  <ellipse cx="180" cy="290" rx="28" ry="22" fill="url(#rock)" stroke="#525252" stroke-width="1.5" transform="rotate(-20 180 290)"/>
  <ellipse cx="220" cy="260" rx="32" ry="26" fill="url(#rock)" stroke="#525252" stroke-width="1.5" transform="rotate(-10 220 260)"/>

  <!-- Body segments -->
  <ellipse cx="265" cy="235" rx="36" ry="30" fill="url(#rock)" stroke="#525252" stroke-width="1.5"/>
  <ellipse cx="310" cy="215" rx="40" ry="34" fill="url(#rock)" stroke="#525252" stroke-width="1.5" transform="rotate(5 310 215)"/>
  <ellipse cx="360" cy="205" rx="42" ry="36" fill="url(#rock)" stroke="#525252" stroke-width="1.5" transform="rotate(-5 360 205)"/>
  <ellipse cx="405" cy="210" rx="40" ry="34" fill="url(#rock)" stroke="#525252" stroke-width="1.5" transform="rotate(8 405 210)"/>
  <ellipse cx="445" cy="230" rx="36" ry="30" fill="url(#rock)" stroke="#525252" stroke-width="1.5" transform="rotate(15 445 230)"/>

  <!-- Head - larger, with horn -->
  <ellipse cx="480" cy="260" rx="44" ry="38" fill="url(#rock)" stroke="#525252" stroke-width="1.5" transform="rotate(20 480 260)"/>
  <!-- Horn on head -->
  <polygon points="495,228 505,195 515,230" fill="#a3a3a3" stroke="#737373" stroke-width="1"/>

  <!-- Eyes -->
  <circle cx="492" cy="252" r="5" fill="#0a0a0a"/>
  <circle cx="493" cy="250" r="2" fill="#fff" opacity="0.8"/>

  <!-- Rock texture lines on segments -->
  <g stroke="#404040" stroke-width="0.8" opacity="0.5">
    <line x1="250" y1="225" x2="270" y2="240"/>
    <line x1="300" y1="205" x2="320" y2="218"/>
    <line x1="345" y1="195" x2="365" y2="210"/>
    <line x1="395" y1="202" x2="412" y2="218"/>
    <line x1="435" y1="222" x2="450" y2="238"/>
    <line x1="470" y1="250" x2="488" y2="268"/>
  </g>

  <!-- Glowing gem crystal that Onix is coiled around -->
  <g filter="url(#glow-filter)" opacity="0.6">
    <polygon points="350,160 370,200 350,240 330,200" fill="#818cf8"/>
  </g>
  <polygon points="350,155 375,200 350,245 325,200" fill="url(#gem)" stroke="#a78bfa" stroke-width="1.5"/>
  <!-- Gem facet lines -->
  <line x1="350" y1="155" x2="350" y2="245" stroke="#a78bfa" stroke-width="0.5" opacity="0.5"/>
  <line x1="325" y1="200" x2="375" y2="200" stroke="#a78bfa" stroke-width="0.5" opacity="0.5"/>
  <!-- Gem sparkle -->
  <circle cx="345" cy="180" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="360" cy="210" r="1.5" fill="#fff" opacity="0.5"/>

  <!-- Title text -->
  <text x="620" y="175" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="80" font-weight="bold" fill="#fff" letter-spacing="-2">onyx</text>

  <!-- Subtitle -->
  <text x="620" y="215" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="18" fill="#a3a3a3">Gemma 4 in your browser</text>

  <!-- Feature pills -->
  <g font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="12">
    <rect x="620" y="240" rx="12" ry="12" width="120" height="24" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
    <text x="645" y="256" fill="#818cf8">WebGPU</text>

    <rect x="752" y="240" rx="12" ry="12" width="120" height="24" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
    <text x="770" y="256" fill="#818cf8">Multimodal</text>

    <rect x="884" y="240" rx="12" ry="12" width="95" height="24" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
    <text x="904" y="256" fill="#818cf8">On-device</text>

    <rect x="620" y="274" rx="12" ry="12" width="90" height="24" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
    <text x="642" y="290" fill="#a3a3a3">E2B</text>

    <rect x="722" y="274" rx="12" ry="12" width="90" height="24" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
    <text x="744" y="290" fill="#a3a3a3">E4B</text>

    <rect x="824" y="274" rx="12" ry="12" width="90" height="24" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
    <text x="843" y="290" fill="#a3a3a3">Arena</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="396" width="1200" height="4" fill="url(#gem)" opacity="0.6"/>
</svg>
